<?xml version="1.0" encoding="UTF-8"?>
<!--
  Timerdoro — Animated demo: timer ring fills 0 → 100% in 5 s, loops.
  Author: Raphael Wudernitz, 2026
  License: CC BY 4.0 (https://creativecommons.org/licenses/by/4.0/)
  Attribution: "Timerdoro Timer Ring Animation" by Raphael Wudernitz
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Animated timer ring filling from 0 to 100 percent">
  <title>Timerdoro Timer Ring Animation</title>
  <desc>Demonstration of the Pomodoro timer's progress ring filling over five seconds, on loop.</desc>

  <!-- track -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="#2a1f1d" stroke-width="14"/>

  <!-- progress ring -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="#ee5c52" stroke-width="14"
          stroke-linecap="round"
          stroke-dasharray="490"
          stroke-dashoffset="490"
          transform="rotate(-90 100 100)">
    <animate attributeName="stroke-dashoffset"
             values="490;0;0;490;490"
             keyTimes="0;0.7;0.85;0.95;1"
             dur="5s"
             repeatCount="indefinite"/>
  </circle>

  <!-- center dot pulse -->
  <circle cx="100" cy="100" r="6" fill="#ee5c52">
    <animate attributeName="r"
             values="6;9;6"
             dur="1.25s"
             repeatCount="indefinite"/>
    <animate attributeName="opacity"
             values="0.9;0.5;0.9"
             dur="1.25s"
             repeatCount="indefinite"/>
  </circle>

  <!-- mode label -->
  <text x="100" y="155" font-family="-apple-system, system-ui, sans-serif"
        font-size="13" font-weight="600" fill="#a0908d"
        text-anchor="middle" letter-spacing="1.5">FOCUS</text>
</svg>
