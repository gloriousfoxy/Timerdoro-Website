<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="press.title">Press Kit — Timerdoro</title>
  <meta name="description" content="Press kit for Timerdoro: logos, screenshots, brand guidelines, and quick facts for journalists and reviewers.">
  <link rel="icon" type="image/png" href="/assets/images/app-icon.png">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

<div id="nav-placeholder"></div>

<main id="main" tabindex="-1">

  <article class="article">
    <header class="article-header">
      <span class="eyebrow" data-i18n="press.eyebrow">Press Kit</span>
      <h1 data-i18n="press.h1">Resources for journalists.</h1>
      <p class="article-subtitle" data-i18n="press.subtitle"></p>
    </header>

    <h2 data-i18n="press.facts.h">Quick Facts</h2>
    <ul>
      <li data-i18n="press.facts.li1"></li>
      <li data-i18n="press.facts.li2"></li>
      <li data-i18n="press.facts.li3"></li>
      <li data-i18n="press.facts.li4"></li>
      <li data-i18n="press.facts.li5"></li>
      <li data-i18n="press.facts.li6"></li>
      <li data-i18n="press.facts.li7"></li>
      <li data-i18n="press.facts.li8"></li>
      <li data-i18n="press.facts.li9"></li>
      <li data-i18n="press.facts.li10"></li>
    </ul>

    <h2 data-i18n="press.boiler.h">Boilerplate Description</h2>
    <p data-i18n="press.boiler.intro"></p>

    <article class="brand-card">
      <h3 data-i18n="press.boiler.short.h">Short (50 words)</h3>
      <p data-i18n="press.boiler.short.t"></p>
    </article>

    <h2 data-i18n="press.brand.h">Brand Guidelines</h2>

    <article class="brand-card">
      <h3 data-i18n="press.brand.name.h">Brand Name</h3>
      <p data-i18n="press.brand.name.p"></p>
    </article>

    <article class="brand-card">
      <h3 data-i18n="press.brand.logo.h">Logo Usage</h3>
      <ul>
        <li data-i18n="press.brand.logo.li1"></li>
        <li data-i18n="press.brand.logo.li2"></li>
        <li data-i18n="press.brand.logo.li3"></li>
        <li data-i18n="press.brand.logo.li4"></li>
      </ul>
      <figure class="brand-figure">
        <img src="/assets/images/press/app-icon-512.png" alt="Timerdoro app icon (512×512)" width="160" height="160" style="border-radius: 36px;">
      </figure>
    </article>

    <article class="brand-card">
      <h3 data-i18n="press.brand.colors.h">Brand Colors</h3>
      <ul>
        <li data-i18n="press.brand.colors.li1"></li>
        <li data-i18n="press.brand.colors.li2"></li>
        <li data-i18n="press.brand.colors.li3"></li>
      </ul>
      <div style="display: flex; gap: 12px; margin-top: 16px;">
        <div style="width: 80px; height: 80px; background: #EE5C52; border-radius: 12px;" role="img" aria-label="Tomato Red"></div>
        <div style="width: 80px; height: 80px; background: #0A0606; border-radius: 12px; border: 1px solid var(--border);" role="img" aria-label="Background Dark"></div>
        <div style="width: 80px; height: 80px; background: #F48D85; border-radius: 12px;" role="img" aria-label="Accent Light"></div>
      </div>
    </article>

    <h2 data-i18n="press.contact.h">Press Contact</h2>
    <p data-i18n="press.contact.p"></p>
    <p><a href="mailto:timerdoro@wudernitz.at?subject=Press%20Inquiry">timerdoro@wudernitz.at</a></p>
    <p data-i18n="press.contact.response"></p>
    <p data-i18n="press.contact.avail"></p>

    <aside class="tldr">
      <p data-i18n="press.note"></p>
    </aside>
  </article>

</main>

<div id="footer-placeholder"></div>

<script src="/assets/js/translations.js"></script>
<script src="/assets/js/i18n.js"></script>
<script src="/assets/js/components.js"></script>
<script src="/assets/js/main.js"></script>
</body>
</html>
